```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MOV to MP4 Converter</title>

<style>
body{
    font-family: Arial, sans-serif;
    max-width:800px;
    margin:40px auto;
    padding:20px;
}

.container{
    border:1px solid #ddd;
    padding:30px;
    border-radius:10px;
}

button{
    padding:10px 20px;
    cursor:pointer;
}

#status{
    margin-top:20px;
    font-weight:bold;
}
</style>

</head>
<body>

<div class="container">

<h1>MOV to MP4 Converter</h1>

<form id="uploadForm">

<input
type="file"
name="video"
id="video"
required
>

<br><br>

<button type="submit">
Convert Video
</button>

</form>

<div id="status"></div>

</div>

<script>

document
.getElementById("uploadForm")
.addEventListener("submit", async function(e){

e.preventDefault();

const file =
document.getElementById("video").files[0];

if(!file){
    alert("Select a file");
    return;
}

const formData = new FormData();

formData.append("video", file);

document.getElementById("status")
.innerHTML = "Uploading...";

try{

const response = await fetch("/convert",{
    method:"POST",
    body:formData
});

if(!response.ok){

const error =
await response.text();

document.getElementById("status")
.innerHTML =
"Error: " + error;

return;
}

const blob =
await response.blob();

const url =
window.URL.createObjectURL(blob);

const a =
document.createElement("a");

a.href = url;
a.download = "converted.mp4";
a.click();

document.getElementById("status")
.innerHTML =
"Conversion Complete";

}catch(err){

document.getElementById("status")
.innerHTML =
"Error: " + err.message;

}

});

</script>

</body>
</html>
```
